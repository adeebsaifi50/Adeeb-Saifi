<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LinkVerse</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>LinkVerse/Adeeb Saifi</h1>

<p>Discover the Best Websites</p>

</header>

<section class="search-section">

<input
type="text"
id="searchInput"
placeholder="Search Website...">

</section>

<section class="category-section">

    <button class="category-btn active" data-category="All">
        🌍 All <span id="allCount"></span>
    </button>

    <button class="category-btn" data-category="Favorites">
    ❤️ Favorites
    </button>

    <button class="category-btn" data-category="AI">
        🤖 AI <span id="aiCount"></span>
    </button>
    
    <button class="category-btn" data-category="Entertainment">
    🎭 Entertainment <span id="entertainmentCount"></span>
    </button>

    <button class="category-btn" data-category="Coding">
        💻 Coding <span id="codingCount"></span>
    </button>

    <button class="category-btn" data-category="Music">
        🎵 Music <span id="musicCount"></span>
    </button>

    <button class="category-btn" data-category="Streaming">
        🎬 Streaming <span id="streamingCount"></span>
    </button>

    <button class="category-btn" data-category="Study">
        📚 Study <span id="studyCount"></span>
    </button>

    <button class="category-btn" data-category="Shopping">
        🛒 Shopping <span id="shoppingCount"></span>
    </button>

    <button class="category-btn" data-category="Travel">
        ✈️ Travel <span id="travelCount"></span>
    </button>

    <button class="category-btn" data-category="Gaming">
        🎮 Gaming <span id="gamingCount"></span>
    </button>

</section>
    
<section class="recent-section">

<h2>🕒 Recently Visited</h2>

<div id="recentContainer"></div>

</section>
    
<section>

<div id="websiteContainer">

</div>

</section>

<script src="websites.js"></script>

<script src="script.js"></script>

</body>
  </html>
